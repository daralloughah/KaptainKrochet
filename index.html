});

/* Faux écran de bot — vraie capture / vidéo viendra du worker (CDP screencast) */
function FauxEcran({ bot }) {
    const ref = useRef(null);

        const c = ref.current;

        const ctx = c.getContext("2d");
        let raf, t = 0;
        const draw = () => {
            t += 0.02;
            ctx.fillStyle = "#0a141c";
            ctx.fillRect(0, 0, c.width, c.height);
            // pseudo "fenêtre de jeu HTML"
            ctx.fillStyle = "#13212e";
            ctx.fillRect(8, 8, c.width - 16, 18);
            ctx.fillStyle = bot.couleur;
            for (let i = 0; i < 3; i++)
                ctx.fillRect(14 + i * 8, 13, 5, 5);
            ctx.fillStyle = "#1a2c3a";
            ctx.fillRect(8, 32, c.width - 16, c.height - 40);
            // curseur qui "clique"
            if (bot.etat === "en mer") {
                const x = c.width / 2 + Math.cos(t) * 22;
                const y = c.height / 2 + Math.sin(t * 1.3) * 14;
                ctx.fillStyle = (Math.sin(t * 6) > 0.7) ? bot.couleur : "#e9eef2";
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            else {

                ctx.font = "10px monospace";
                ctx.fillText(bot.etat === "buggé" ? "⚠ à la dérive" : "à quai", 14, c.height / 2);

.kk-view{animation:rise .4s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}}
.kk-titre{margin-bottom:20px}
.kk-eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--laiton)}
.kk-titre h1{font-family:'Georgia',serif;font-size:30px;margin:6px 0 0;font-weight:700;letter-spacing:.01em}
.kk-lede{color:var(--brume);font-size:14px;line-height:1.6;max-width:60ch;margin:0 0 18px}

/* ---- Cadran / barre ---- */
.kk-helm{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:14px}
@media(min-width:680px){.kk-helm{grid-template-columns:1.1fr 1fr}}
.kk-helm-ring{position:relative;background:
   radial-gradient(circle at 50% 40%, #16384f, var(--pont));
  border:1px solid var(--corde);border-radius:20px;padding:34px 20px;text-align:center;overflow:hidden}
.kk-helm-ring::before{content:"";position:absolute;inset:-2px;border-radius:20px;
  background:conic-gradient(from 0deg,transparent,var(--laiton)44,transparent 30%);
  animation:spin 8s linear infinite;z-index:0;opacity:.5}
.kk-helm-ring::after{content:"";position:absolute;inset:3px;border-radius:18px;background:
   radial-gradient(circle at 50% 40%, #16384f, var(--pont));z-index:1}
@keyframes spin{to{transform:rotate(360deg)}}
.kk-helm-val,.kk-helm-lab{position:relative;z-index:2}
.kk-helm-val{font-family:'Georgia',serif;font-size:clamp(40px,11vw,64px);font-weight:700;
  color:var(--laiton);line-height:1;letter-spacing:-.02em}
.kk-helm-lab{margin-top:8px;color:var(--brume);font-size:13px;letter-spacing:.05em}
.kk-helm-side{display:grid;gap:14px}
.kk-helmstat{background:var(--pont);border:1px solid var(--corde);border-radius:16px;
  padding:20px;display:flex;flex-direction:column;justify-content:center}
.kk-helmstat.vert{border-left:3px solid var(--vert)}
.kk-helmstat.cyan{border-left:3px solid var(--cyan)}
.kk-helmstat-val{font-family:'Georgia',serif;font-size:32px;font-weight:700}
.kk-helmstat-lab{color:var(--brume);font-size:12px;margin-top:4px}

/* ---- Jauges ---- */
.kk-gauges{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
@media(min-width:680px){.kk-gauges{grid-template-columns:repeat(4,1fr)}}
.kk-jauge{background:var(--pont);border:1px solid var(--corde);border-radius:14px;padding:16px}
.kk-jauge.rouge{border-color:#5a2228;background:#1c1013}
.kk-jauge.ambre{border-color:#5a4a1c;background:#1c1810}
.kk-jauge-icon{color:var(--brume)}
.kk-jauge.rouge .kk-jauge-icon{color:var(--rouge)}
.kk-jauge.ambre .kk-jauge-icon{color:var(--ambre)}
.kk-jauge-val{font-family:'Georgia',serif;font-size:26px;font-weight:700;margin:8px 0 2px}
.kk-jauge-lab{font-size:11px;color:var(--brume)}

/* ---- Panels ---- */
.kk-panel{background:var(--pont);border:1px solid var(--corde);border-radius:16px;
  padding:16px;margin-bottom:16px}
.kk-panel-head{display:flex;align-items:center;gap:8px;font-size:13px;
  letter-spacing:.04em;color:var(--ecume);margin-bottom:14px}
.kk-panel-head svg{color:var(--laiton)}
.kk-panel-foot{font-size:11px;color:var(--brume);margin-top:10px;text-align:center}
.kk-pique{color:var(--laiton);font-style:italic}

/* ---- Manifeste ---- */
.kk-manifeste{display:flex;flex-direction:column;gap:3px}
.kk-manif-row{display:grid;grid-template-columns:38px 1fr 2.2fr auto 10px;align-items:center;
  gap:10px;background:none;border:none;color:var(--ecume);padding:7px 6px;border-radius:9px;
  cursor:pointer;transition:.15s;text-align:left;width:100%}
.kk-manif-row:hover{background:var(--planche)}
.kk-manif-id{font-family:monospace;font-size:12px;font-weight:700}
.kk-manif-nom{font-size:13px;color:var(--brume);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kk-manif-bar{height:7px;background:var(--abysse);border-radius:4px;overflow:hidden}
.kk-manif-fill{height:100%;border-radius:4px;transition:width .6s}
.kk-manif-val{font-family:monospace;font-size:12px;text-align:right;min-width:48px}
.kk-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ---- Search ---- */
.kk-search{display:flex;align-items:center;gap:10px;background:var(--pont);
  border:1px solid var(--corde);border-radius:13px;padding:11px 14px;margin-bottom:16px}
.kk-search svg{color:var(--brume)}
.kk-search input{flex:1;background:none;border:none;color:var(--ecume);font-size:14px;outline:none}

/* ---- Grid équipage ---- */
.kk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.kk-card{background:var(--pont);border:1px solid var(--corde);border-radius:16px;overflow:hidden;
  transition:.2s}
.kk-card:hover{border-color:var(--corde);transform:translateY(-2px);
  box-shadow:0 12px 30px -12px #000a}
.kk-card-screen{position:relative;display:block;width:100%;border:none;padding:0;cursor:pointer;
  background:var(--abysse);line-height:0}
.kk-canvas{width:100%;height:auto;display:block}
.kk-card-eye{position:absolute;bottom:8px;right:8px;display:flex;align-items:center;gap:5px;
  font-size:10px;background:rgba(7,16,25,.78);color:var(--ecume);padding:4px 8px;border-radius:8px;
  opacity:0;transition:.2s;line-height:1}
.kk-card-screen:hover .kk-card-eye{opacity:1}
.kk-card-body{padding:13px}
.kk-card-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.kk-card-nom{font-weight:600;font-size:14px}
.kk-statut{display:flex;align-items:center;gap:5px;font-size:11px}
.kk-card-meta{font-size:11px;color:var(--brume);margin:5px 0 9px}
.kk-card-stats{display:flex;gap:12px;font-size:11px;color:var(--brume);margin-bottom:11px;flex-wrap:wrap}
.kk-card-stats span{display:flex;align-items:center;gap:4px}
.kk-warn{color:var(--ambre)!important}
.kk-toggle{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--planche);border:1px solid var(--corde);color:var(--ecume);
  border-radius:10px;padding:9px;font-size:12px;cursor:pointer;transition:.18s}
.kk-toggle:hover{background:var(--corde)}

/* ---- Fiche ---- */
.kk-fiche{position:fixed;top:0;right:0;bottom:0;width:min(92vw,420px);z-index:40;
  background:linear-gradient(180deg,var(--coque),var(--abysse));border-left:1px solid var(--corde);
  padding:20px;overflow-y:auto;animation:slideL .3s cubic-bezier(.2,.8,.2,1)}
@keyframes slideL{from{transform:translateX(100%)}}
.kk-fiche-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.kk-fiche-nom{font-family:'Georgia',serif;font-size:22px;font-weight:700}
.kk-fiche-sub{font-size:12px;margin-top:3px}
.kk-fiche-head button{background:none;border:none;color:var(--brume);cursor:pointer}
.kk-live{position:relative;background:var(--abysse);border:1px solid var(--corde);
  border-radius:14px;overflow:hidden;margin-bottom:16px;line-height:0}
.kk-live .kk-canvas{width:100%}
.kk-live-tag{position:absolute;top:9px;left:9px;z-index:2;display:flex;align-items:center;gap:5px;
  font-size:10px;letter-spacing:.1em;background:#2a1014;color:var(--rouge);padding:4px 8px;
  border-radius:7px;line-height:1}
.kk-live-tag svg{animation:pulse 1.4s infinite}
.kk-fiche-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.kk-fichestat{background:var(--pont);border:1px solid var(--corde);border-radius:11px;padding:11px 13px}
.kk-fichestat.alerte{border-color:#5a4a1c;background:#1c1810}
.kk-fichestat-lab{font-size:10px;color:var(--brume);text-transform:uppercase;letter-spacing:.08em}
.kk-fichestat-val{font-family:'Georgia',serif;font-size:18px;font-weight:700;margin-top:3px}
.kk-fiche-actions{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.kk-fiche-note{font-size:11px;color:var(--brume);line-height:1.6;border-top:1px solid var(--corde);
  padding-top:13px}

/* ---- Boutons ---- */
.kk-btn-primaire,.kk-btn-ghost,.kk-btn-danger{display:flex;align-items:center;justify-content:center;
  gap:7px;border-radius:11px;padding:12px;font-size:13px;cursor:pointer;border:1px solid;transition:.18s;
  font-weight:500}
.kk-btn-primaire{background:var(--laiton);color:#1a1206;border-color:var(--laiton)}
.kk-btn-primaire:hover{filter:brightness(1.08)}
.kk-btn-ghost{background:var(--planche);color:var(--ecume);border-color:var(--corde)}
.kk-btn-ghost:hover{background:var(--corde)}
.kk-btn-danger{background:#1c1013;color:var(--rouge);border-color:#5a2228}
.kk-btn-danger:hover{background:#2a1014}
.kk-btn-lg{padding:15px;font-size:14px}

/* ---- Formulaire recrue ---- */
.kk-form{max-width:560px;display:flex;flex-direction:column;gap:22px}
.kk-field{display:flex;flex-direction:column;gap:9px}
.kk-field>span{font-size:13px;font-weight:600}
.kk-field small{font-size:11px;color:var(--brume);line-height:1.5}
.kk-stepper{display:flex;align-items:center;gap:0;width:fit-content;
  border:1px solid var(--corde);border-radius:11px;overflow:hidden;background:var(--pont)}
.kk-stepper button{background:var(--planche);border:none;color:var(--ecume);width:42px;height:42px;
  font-size:20px;cursor:pointer}
.kk-stepper button:hover{background:var(--corde)}
.kk-stepper input{width:90px;height:42px;background:none;border:none;color:var(--ecume);
  text-align:center;font-size:18px;font-family:'Georgia',serif;outline:none}
.kk-choices{display:flex;flex-wrap:wrap;gap:8px}
.kk-choice{background:var(--pont);border:1px solid var(--corde);color:var(--brume);
  padding:10px 14px;border-radius:10px;font-size:13px;cursor:pointer;transition:.18s}
.kk-choice:hover{border-color:var(--c);color:var(--ecume)}
.kk-choice.actif{background:color-mix(in srgb,var(--c) 16%,transparent);
  border-color:var(--c);color:var(--ecume)}
.kk-select{background:var(--pont);border:1px solid var(--corde);color:var(--ecume);
  padding:12px;border-radius:11px;font-size:14px;outline:none}
.kk-recap{font-size:13px;color:var(--brume);line-height:1.6;background:var(--pont);
  border:1px dashed var(--corde);border-radius:12px;padding:14px}
.kk-recap strong{color:var(--ecume)}

/* ---- Mousses ---- */
.kk-mousses{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.kk-mousse{display:flex;align-items:center;gap:13px;background:var(--pont);
  border:1px solid var(--corde);border-radius:14px;padding:13px}
.kk-mousse.coupe{opacity:.6}
.kk-mousse-av{width:42px;height:42px;border-radius:11px;background:var(--planche);
  display:grid;place-items:center;font-family:'Georgia',serif;font-weight:700;color:var(--laiton);
  border:1px solid var(--corde)}
.kk-mousse-info{flex:1}
.kk-mousse-nom{font-weight:600;font-size:14px}
.kk-mousse-meta{font-size:11px;color:var(--brume);margin-top:2px}
.kk-acces{display:flex;align-items:center;gap:6px;border-radius:9px;padding:8px 12px;
  font-size:11px;cursor:pointer;border:1px solid;transition:.18s}
.kk-acces.on{background:#0c2418;color:var(--vert);border-color:#1c4c38}
.kk-acces.off{background:#2a1014;color:var(--rouge);border-color:#5a2228}
.kk-admin-note{display:flex;gap:12px;align-items:flex-start;font-size:12px;color:var(--brume);
  line-height:1.6}
.kk-admin-note svg{color:var(--laiton);flex-shrink:0;margin-top:2px}
.kk-admin-note strong{color:var(--ecume)}

/* ---- Santé / signatures ---- */
.kk-health{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:560px){.kk-health{grid-template-columns:repeat(4,1fr)}}
.kk-health>div{background:var(--planche);border:1px solid var(--corde);border-radius:11px;
  padding:13px;text-align:center}
.kk-health span{display:block;font-family:'Georgia',serif;font-size:24px;font-weight:700}
.kk-health small{font-size:11px;color:var(--brume)}
.kk-health .bad span{color:var(--rouge)}
.kk-health .warn span{color:var(--ambre)}
.kk-sigs{display:flex;flex-wrap:wrap;gap:8px}
.kk-sig{display:flex;align-items:center;gap:6px;background:var(--planche);border:1px solid var(--corde);
  color:var(--brume);padding:8px 11px;border-radius:9px;font-size:12px;cursor:pointer}
.kk-sig svg{color:var(--brume)}
.kk-sig-add{color:var(--laiton);border-style:dashed}

.kk-overboard{display:flex;align-items:center;gap:9px;background:#2a1014;border:1px solid #5a2228;
  color:var(--rouge);border-radius:11px;padding:11px 13px;font-size:12px;line-height:1.5;
  margin-bottom:16px;animation:bob 2s ease-in-out infinite}
.kk-overboard svg{flex-shrink:0}
@keyframes bob{50%{transform:translateY(-2px)}}

/* ---- Géo sur carte ---- */
.kk-card-geo{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--brume);
  margin-bottom:9px}
.kk-card-geo-sep{opacity:.5}

/* ---- Réglages réseau dans la fiche ---- */
.kk-cap{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--laiton);margin:4px 0 11px}
.kk-reglages{display:flex;flex-direction:column;gap:13px;margin-bottom:16px;
  background:var(--pont);border:1px solid var(--corde);border-radius:14px;padding:15px}
.kk-reg{display:flex;flex-direction:column;gap:7px}
.kk-reg>span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brume)}
.kk-input{background:var(--planche);border:1px solid var(--corde);color:var(--ecume);
  padding:10px 12px;border-radius:9px;font-size:13px;outline:none;font-family:monospace}
.kk-rot{display:flex;align-items:center;gap:11px}
.kk-stepper-sm{border-radius:9px}
.kk-stepper-sm button{width:36px;height:36px;font-size:17px}
.kk-stepper-sm input{width:60px;height:36px;font-size:16px}
.kk-rot-unit{font-size:13px;color:var(--brume)}
.kk-ipnow{background:var(--planche);border:1px dashed var(--corde);border-radius:10px;
  padding:11px 13px;font-size:12px;color:var(--brume);display:flex;flex-direction:column;gap:3px}
.kk-ipnow strong{color:var(--ecume);font-family:monospace}
.kk-ipnow-sub{font-size:11px;opacity:.8}

/* ---- Débogage ---- */
.kk-debug{background:var(--abysse);border:1px solid var(--corde);border-radius:11px;
  padding:11px 13px;display:flex;flex-direction:column;gap:6px}
.kk-debug-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.kk-debug-row span{color:var(--brume)}
.kk-debug-row code{color:var(--laiton);font-family:monospace;font-size:11px}

*:focus-visible{outline:2px solid var(--laiton);outline-offset:2px;border-radius:8px}
`;

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(KaptainKrochet));
} catch (e) {
  var fb=document.getElementById('kk-fallback'), err=document.getElementById('kk-err');
  if(fb&&err){ fb.style.display='block'; err.textContent='Erreur de rendu: '+e.message; }
}
</script>
</body>
</html>
